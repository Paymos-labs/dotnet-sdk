name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: 8.0.x
      - run: dotnet format src/Paymos/Paymos.csproj --verify-no-changes
      - run: dotnet build src/Paymos/Paymos.csproj --configuration Release
      - run: dotnet run --project tests/Paymos.Conformance/Paymos.Conformance.csproj --configuration Release
      - run: dotnet pack src/Paymos/Paymos.csproj --configuration Release --output artifacts
      - name: Test the packed NuGet in isolation
        run: |
          dotnet new console --framework net8.0 --output /tmp/paymos-consumer
          dotnet add /tmp/paymos-consumer package Paymos --source "$GITHUB_WORKSPACE/artifacts"
          dotnet build /tmp/paymos-consumer --configuration Release
